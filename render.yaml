services:
  - type: web
    name: sentinel-backend
    env: python
    plan: free
    region: oregon
    buildCommand: "cd backend && pip install -r requirements.txt"
    preDeployCommand: "cd backend && alembic upgrade head"
    startCommand: "cd backend && uvicorn src.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_TTL_MINUTES
        value: 15
      - key: REFRESH_TOKEN_TTL_DAYS
        value: 7
      - key: BCRYPT_ROUNDS
        value: 12
      - key: LOGIN_RATE_LIMIT_ATTEMPTS
        value: 5
      - key: LOGIN_RATE_LIMIT_WINDOW_SECONDS
        value: 300
      - key: DISCOVERY_QUEUE_NAME
        value: discovery_jobs
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        value: test
      - key: AWS_SECRET_ACCESS_KEY
        value: test
      - key: AWS_ENDPOINT_URL
        value: http://localhost:4566
      - key: CORS_ALLOW_ORIGINS
        value: https://sentinel-frontend.onrender.com,http://localhost:5173,http://127.0.0.1:4173
      - key: DATABASE_URL
        fromDatabase:
          name: sentinel-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sentinel-redis
          property: connectionString

  - type: static
    name: sentinel-frontend
    plan: free
    region: oregon
    buildCommand: "cd frontend && npm ci && npm run build"
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://sentinel-backend.onrender.com/api/v1

  - type: redis
    name: sentinel-redis
    plan: free

databases:
  - name: sentinel-postgres
    databaseName: sentinel
    user: sentinel
    plan: free
