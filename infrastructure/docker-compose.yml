version: "3.9"

# Phase 2 scope only: Postgres + backend API.
# Per SAD §10 and the Redis-deferral decision (approved during architecture
# review), redis/worker/localstack/neo4j/ollama services are intentionally
# NOT present here — they are added incrementally starting Phase 4, so this
# file grows with the project instead of being written in full up front.

services:
  postgres:
    image: postgres:16
    container_name: sentinel-postgres
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel
    ports:
      - "5432:5432"
    volumes:
      - sentinel_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.6
    container_name: sentinel-localstack
    environment:
      SERVICES: iam,s3,ec2
      AWS_DEFAULT_REGION: us-east-1
      EAGER_SERVICE_LOADING: 1
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sentinel-backend
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://sentinel:sentinel@postgres:5432/sentinel
      REDIS_URL: redis://redis:6379/0
      AWS_ENDPOINT_URL: http://localstack:4566
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ../backend:/app

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sentinel-worker
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://sentinel:sentinel@postgres:5432/sentinel
      REDIS_URL: redis://redis:6379/0
      AWS_ENDPOINT_URL: http://localstack:4566
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    command: python -m src.worker
    volumes:
      - ../backend:/app

volumes:
  sentinel_pg_data:
